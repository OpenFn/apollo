name: Build and push Docker images

on:
  push:
    tags: "@openfn/apollo@**"

jobs:
  build-and-push-worker-image:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Manipulate tag for docker
        id: branch_name
        run: |
          SOURCE_TAG=${GITHUB_REF#refs/tags/}
          echo Source Tag: $SOURCE_TAG

          VERSION_TAG=${SOURCE_TAG#@openfn/apollo}
          echo Version Tag: $VERSION_TAG

          DOCKER_TAG=${VERSION_TAG#@}
          echo Docker Tag: $DOCKER_TAG

          echo "DOCKER_TAG=$DOCKER_TAG" >> $GITHUB_ENV

          # Only move :latest for final releases. A version with a hyphen
          # (e.g. 1.4.0-pre.0) is a pre-release and must not repoint latest.
          {
            echo "DOCKER_TAGS<<EOF"
            echo "openfn/apollo:v${DOCKER_TAG}"
            [[ "$DOCKER_TAG" != *-* ]] && echo "openfn/apollo:latest"
            echo "EOF"
          } >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.DOCKER_TAGS }}
